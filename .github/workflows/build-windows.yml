name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: false
        default: 'dev'

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-hiddify-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: hiddify-core/go.sum

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Apply PIXELLNET patch to hiddify-core
        working-directory: hiddify-core
        run: |
          git apply ../hiddify-core-pixellnet.patch
          echo "--- patched builder.go lines ---"
          grep -A2 "PIXELLNET RU-bypass" v2/config/builder.go | head -10

      - name: Build hiddify-core.dll + HiddifyCli.exe
        working-directory: hiddify-core
        run: |
          make windows-amd64
          ls -la bin/

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hiddify-core-windows
          path: |
            hiddify-core/bin/hiddify-core.dll
            hiddify-core/bin/HiddifyCli.exe
            hiddify-core/bin/libcronet.dll
          retention-days: 1

  build:
    needs: build-hiddify-core
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Flutter 3.44.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: pub-windows-${{ hashFiles('pubspec.lock') }}

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $v = "${{ github.ref }}" -replace 'refs/tags/v',''
          } elseif ("${{ inputs.version }}" -ne "") {
            $v = "${{ inputs.version }}"
          } else {
            $v = "dev-${{ github.run_number }}"
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $v"

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate slang translations
        run: dart run slang

      - name: Generate freezed/drift/riverpod/mappable code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Download hiddify-core native artifacts
        uses: actions/download-artifact@v4
        with:
          name: hiddify-core-windows
          path: hiddify-core/bin/
          merge-multiple: true

      - name: Verify native artifacts
        shell: pwsh
        run: |
          Get-ChildItem hiddify-core/bin/
          if (-not (Test-Path hiddify-core/bin/hiddify-core.dll)) {
            throw "hiddify-core.dll missing after download!"
          }

      - name: Flutter build windows release
        run: flutter build windows --release --build-number=${{ github.run_number }} --build-name=${{ steps.ver.outputs.version }}

      - name: Bundle release archive
        shell: pwsh
        run: |
          $out = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$out\*" -DestinationPath "pixellnet-windows-x64-${{ steps.ver.outputs.version }}.zip" -Force
          Get-ChildItem "pixellnet-windows-x64-*.zip" | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixellnet-windows-x64
          path: pixellnet-windows-x64-*.zip
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: pixellnet-windows-x64-*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
