name: Build Android Admin Flavor

# Admin flavor — только по явному запуску. Отдельный APK для superadmin
# (com.pixellnet.vpn.admin, отдельный applicationId, ставится рядом с prod).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.0.43)'
        required: true

concurrency:
  group: build-android-admin-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 3.38.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Cache pub + gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate slang translations
        run: dart run slang

      - name: Generate freezed/drift/riverpod/mappable code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Download prebuilt hiddify-core Android libbox.aar
        run: |
          curl -fL -o /tmp/hiddify-lib-android.tar.gz \
            https://github.com/hiddify/hiddify-core/releases/download/v4.1.0/hiddify-lib-android.tar.gz
          mkdir -p android/app/libs
          tar -xzf /tmp/hiddify-lib-android.tar.gz -C android/app/libs
          rm /tmp/hiddify-lib-android.tar.gz

      - name: Flutter build ADMIN APK (arm64 only)
        run: |
          flutter build apk --release \
            --flavor admin \
            --dart-define=SUPERADMIN=true \
            --target-platform=android-arm64 \
            --build-number=${{ github.run_number }} \
            --build-name=${{ inputs.version }}
          mkdir -p out
          for f in build/app/outputs/flutter-apk/*admin*.apk; do
            base=$(basename "$f")
            cp "$f" "out/pixellnet-admin-${{ inputs.version }}-${base}"
          done
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixellnet-admin-android-apk
          path: out/*.apk
          retention-days: 30
