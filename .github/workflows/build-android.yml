name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: false
        default: 'dev'

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 3.44.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Cache pub + gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*') }}

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${{ github.ref }}"
            V="${V#refs/tags/v}"
          elif [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="dev-${{ github.run_number }}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Resolved version: $V"

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate slang translations
        run: dart run slang

      - name: Generate freezed/drift/riverpod/mappable code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Download prebuilt hiddify-core Android libbox.aar
        run: |
          curl -fL -o /tmp/hiddify-lib-android.tar.gz \
            https://github.com/hiddify/hiddify-core/releases/download/v4.1.0/hiddify-lib-android.tar.gz
          mkdir -p android/app/libs
          tar -xzf /tmp/hiddify-lib-android.tar.gz -C android/app/libs
          rm /tmp/hiddify-lib-android.tar.gz

      - name: Decode keystore + write key.properties
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/pixellnet.keystore
            # build.gradle читает key.properties для release-подписи
            {
              printf 'storeFile=app/pixellnet.keystore\n'
              printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
              printf 'keyAlias=%s\n' "$KEY_ALIAS"
              printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            } > android/key.properties
            echo "signed=true" >> $GITHUB_OUTPUT
            echo "APK will be signed with release keystore"
          else
            echo "signed=false" >> $GITHUB_OUTPUT
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — building unsigned APK"
          fi

      - name: Flutter build APK release (split per ABI)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          flutter build apk --release \
            --split-per-abi \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.ver.outputs.version }}
          mkdir -p out
          for f in build/app/outputs/flutter-apk/*.apk; do
            base=$(basename "$f")
            cp "$f" "out/pixellnet-${{ steps.ver.outputs.version }}-${base}"
          done
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixellnet-android-apk
          path: out/*.apk
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
