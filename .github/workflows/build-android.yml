name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: false
        default: 'dev'

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 3.44.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Cache pub + gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*') }}

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${{ github.ref }}"
            V="${V#refs/tags/v}"
          elif [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="dev-${{ github.run_number }}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Resolved version: $V"

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate slang translations
        run: dart run slang

      - name: Generate freezed/drift/riverpod/mappable code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: hiddify-core/go.sum

      - name: Apply PIXELLNET patch to hiddify-core
        working-directory: hiddify-core
        run: |
          git apply ../hiddify-core-pixellnet.patch
          echo "--- patched builder.go lines ---"
          grep -A2 "PIXELLNET RU-bypass" v2/config/builder.go | head -10

      - name: Build hiddify-core Android AAR (from source with PIXELLNET patches)
        working-directory: hiddify-core
        run: |
          # ANDROID_NDK_HOME preset by ubuntu-latest runner (setup-android auto)
          if [ -z "$ANDROID_NDK_HOME" ]; then
            export ANDROID_NDK_HOME="$ANDROID_HOME/ndk-bundle"
            if [ ! -d "$ANDROID_NDK_HOME" ]; then
              # pick latest NDK if bundle absent
              export ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -1)
            fi
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          make android
          ls -la bin/
          mkdir -p ../android/app/libs
          cp bin/hiddify-core.aar ../android/app/libs/libbox.aar
          ls -la ../android/app/libs/

      - name: Verify keystore in repo
        id: keystore
        run: |
          # v0.1.21: keystore + key.properties commit'нуты в репо
          # (zero-config CI — юзеру не нужно добавлять GH secrets).
          if [ -f android/app/pixellnet.keystore ] && [ -f android/key.properties ]; then
            echo "signed=true" >> $GITHUB_OUTPUT
            echo "APK будет подписан release keystore"
          else
            echo "signed=false" >> $GITHUB_OUTPUT
            echo "::error::keystore или key.properties отсутствуют в репо"
            exit 1
          fi

      - name: Flutter build APK release (split per ABI)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          flutter build apk --release \
            --split-per-abi \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.ver.outputs.version }}
          mkdir -p out
          for f in build/app/outputs/flutter-apk/*.apk; do
            base=$(basename "$f")
            cp "$f" "out/pixellnet-${{ steps.ver.outputs.version }}-${base}"
          done
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixellnet-android-apk
          path: out/*.apk
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
